<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - SiteSawa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
    .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #111118; border-right: 1px solid #1f2937; padding: 24px; }
    .sidebar .logo { font-size: 20px; font-weight: 800; color: #a3e635; margin-bottom: 32px; }
    .nav-item { display: block; padding: 12px 16px; border-radius: 8px; color: #9ca3af; text-decoration: none; font-size: 14px; font-weight: 500; margin-bottom: 4px; transition: all 0.2s; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: #1f2937; color: #fff; }
    .main { margin-left: 240px; padding: 32px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { font-size: 28px; font-weight: 700; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: #111118; border: 1px solid #1f2937; border-radius: 12px; padding: 24px; }
    .stat-card h3 { font-size: 13px; color: #6b7280; font-weight: 500; margin-bottom: 8px; }
    .stat-card .number { font-size: 32px; font-weight: 800; color: #a3e635; }
    .table-container { background: #111118; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 14px 20px; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1f2937; }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #1f2937; }
    td:last-child { border-bottom: none; }
    tr:hover td { background: #1f2937; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-me { background: #fef3c7; color: #92400e; }
    .badge-biz { background: #dbeafe; color: #1e40af; }
    .badge-shop { background: #dcfce7; color: #166534; }
    .btn-sm { padding: 6px 14px; border-radius: 6px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; }
    .btn-view { background: #1f2937; color: #fff; }
    .btn-view:hover { background: #374151; }
    .btn-delete { background: #7f1d1d; color: #fca5a5; }
    .btn-delete:hover { background: #991b1b; }
    .empty { text-align: center; padding: 60px; color: #6b7280; }
    .loading { text-align: center; padding: 60px; color: #6b7280; }
    .error-box { background: #7f1d1d; color: #fca5a5; padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; }
    .hidden { display: none; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #111118; border: 1px solid #1f2937; border-radius: 16px; padding: 32px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 20px; }
    .modal-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1f2937; font-size: 14px; }
    .modal-row:last-child { border-bottom: none; }
    .modal-row span:first-child { color: #6b7280; }
    .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #6b7280; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">SiteSawa</div>
    <a class="nav-item active" onclick="showSection('customers')">All Customers</a>
    <a class="nav-item" onclick="showSection('orders')">Orders</a>
    <a class="nav-item" onclick="logout()">Logout</a>
  </div>

  <div class="main">
    <div class="header">
      <h1>Master View</h1>
      <span id="adminName" style="color:#6b7280;font-size:14px;">Admin</span>
    </div>

    <div id="customersSection">
      <div class="stats">
        <div class="stat-card">
          <h3>Total Customers</h3>
          <div class="number" id="totalCustomers">-</div>
        </div>
        <div class="stat-card">
          <h3>ME Plans</h3>
          <div class="number" id="meCount">-</div>
        </div>
        <div class="stat-card">
          <h3>BIZ Plans</h3>
          <div class="number" id="bizCount">-</div>
        </div>
        <div class="stat-card">
          <h3>SHOP Plans</h3>
          <div class="number" id="shopCount">-</div>
        </div>
      </div>

      <div class="table-container">
        <div class="loading" id="loadingMsg">Loading customers...</div>
        <div class="error-box hidden" id="errorMsg"></div>
        <table id="customersTable" class="hidden">
          <thead>
            <tr>
              <th>Phone</th>
              <th>Template</th>
              <th>Subdomain</th>
              <th>Products</th>
              <th>Orders</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="customersBody"></tbody>
        </table>
        <div class="empty hidden" id="emptyMsg">No customers yet.</div>
      </div>
    </div>

    <div id="ordersSection" class="hidden">
      <div class="table-container">
        <div class="empty">Orders view coming soon.</div>
      </div>
    </div>
  </div>

  <div id="customerModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="position:relative;">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2>Customer Details</h2>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let customers = [];

    function getToken() {
      return localStorage.getItem('sitesawa_admin_token');
    }

    function checkAuth() {
      if (!getToken()) {
        window.location.href = '/login.html';
      }
    }

    async function loadCustomers() {
      const loading = document.getElementById('loadingMsg');
      const error = document.getElementById('errorMsg');
      const table = document.getElementById('customersTable');
      const empty = document.getElementById('emptyMsg');

      try {
        const res = await fetch(`${API_BASE}/api/admin/customers`, {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401) {
            localStorage.removeItem('sitesawa_admin_token');
            window.location.href = '/login.html';
            return;
          }
          throw new Error(data.error || 'Failed to load');
        }

        customers = data.customers || [];
        loading.classList.add('hidden');

        document.getElementById('totalCustomers').textContent = customers.length;
        document.getElementById('meCount').textContent = customers.filter(c => c.template === 'me').length;
        document.getElementById('bizCount').textContent = customers.filter(c => c.template === 'biz').length;
        document.getElementById('shopCount').textContent = customers.filter(c => c.template === 'shop').length;

        if (customers.length === 0) {
          empty.classList.remove('hidden');
          return;
        }

        const tbody = document.getElementById('customersBody');
        tbody.innerHTML = customers.map(c => `
          <tr>
            <td>${c.phone}</td>
            <td><span class="badge badge-${c.template}">${c.template.toUpperCase()}</span></td>
            <td>${c.subdomain || '-'}</td>
            <td>${(c.products || []).length}</td>
            <td>${(c.orders || []).length}</td>
            <td>${new Date(c.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn-sm btn-view" onclick="viewCustomer('${c._id}')">View</button>
              <button class="btn-sm btn-delete" onclick="deleteCustomer('${c._id}')">Delete</button>
            </td>
          </tr>
        `).join('');

        table.classList.remove('hidden');
      } catch (err) {
        loading.classList.add('hidden');
        error.textContent = err.message;
        error.classList.remove('hidden');
      }
    }

    async function viewCustomer(id) {
      const customer = customers.find(c => c._id === id);
      if (!customer) return;
      const content = document.getElementById('modalContent');
      content.innerHTML = `
        <div class="modal-row"><span>Phone</span><span>${customer.phone}</span></div>
        <div class="modal-row"><span>Template</span><span class="badge badge-${customer.template}">${customer.template.toUpperCase()}</span></div>
        <div class="modal-row"><span>Subdomain</span><span>${customer.subdomain || 'Not set'}</span></div>
        <div class="modal-row"><span>Custom Domain</span><span>${customer.customDomain || 'Not set'}</span></div>
        <div class="modal-row"><span>Products</span><span>${(customer.products || []).length}</span></div>
        <div class="modal-row"><span>Orders</span><span>${(customer.orders || []).length}</span></div>
        <div class="modal-row"><span>Joined</span><span>${new Date(customer.createdAt).toLocaleString()}</span></div>
      `;
      document.getElementById('customerModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('customerModal').classList.add('hidden');
    }

    async function deleteCustomer(id) {
      if (!confirm('Delete this customer permanently?')) return;
      try {
        const res = await fetch(`${API_BASE}/api/admin/customers/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        if (res.ok) {
          loadCustomers();
        } else {
          alert('Delete failed');
        }
      } catch (err) {
        alert('Network error');
      }
    }

    function showSection(section) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('customersSection').classList.toggle('hidden', section !== 'customers');
      document.getElementById('ordersSection').classList.toggle('hidden', section !== 'orders');
    }

    function logout() {
      localStorage.removeItem('sitesawa_admin_token');
      window.location.href = '/login.html';
    }

    checkAuth();
    loadCustomers();
  </script>
</body>
</html>
